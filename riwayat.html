<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat</title>
</head>
<body>
    <a href="index.html">Kembali ke Menu</a>
    <h2>Riwayat Pembelian</h2>
    <div id="history-container"></div>

    <script>
        let history = JSON.parse(localStorage.getItem("history")) || []

        function displayHistory() {
            if (history.length === 0) {
                document.getElementById("history-container").innerHTML = "<p>Belum ada riwayat pembelian.</p>"
                return
            }
            let template = ""
            for (let i = 0; i < history.length; i++) {
                let entry = history[i]
                let total = entry.items.reduce((sum, item) => sum + item.price, 0)
                let itemsList = entry.items.map(item => `${item.title} (Rp ${item.price})`).join(", ")
                template += `<div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
                    <p>Tanggal: ${new Date(entry.date).toLocaleString()}</p>
                    <p>Item: ${itemsList}</p>
                    <p>Total: Rp ${total}</p>
                </div>`
            }
            document.getElementById("history-container").innerHTML = template
        }

        displayHistory()
    </script>
</body>
</html>
