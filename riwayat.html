<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat</title>
    <link rel="stylesheet" href="riwayat.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>POLICE GRAMMAR STORE</h1>

    <nav>
        <a href="index.html">Menu</a>
        <a href="cart.html">Cart</a>
    </nav>
    <h2>Riwayat Pembelian</h2>
    <div id="history-container"></div>

    <script>

        // variabel untuk nampung data history
        let history = JSON.parse(localStorage.getItem("history")) || []

        // untuk nampilin data history ke halaman
        function displayHistory() {
            if (history.length === 0) {
                document.getElementById("history-container").innerHTML = "<p class='no-history'>Belum ada riwayat pembelian.</p>"
                return
            }

            // buat template untuk nampilin data history
            let template = ""

            // loop untuk nampilin setiap entry history
            for (let i = 0; i < history.length; i++) {
                let entry = history[i]
                let total = entry.items.reduce((sum, item) => sum + item.price, 0)

            // buat list item yang dibeli
            let itemsList = "<ul class='items-list'>" + 
                entry.items.map(item => `<li>${item.title} (Rp ${item.price.toLocaleString("id-ID")})</li>`).join("") + 
                "</ul>"
            
            // buat template untuk setiap entry history
            template += `<div class="history-entry">
                <p>Tanggal: ${new Date(entry.date).toLocaleString()}</p>
                <p>Item:</p>
                ${itemsList}
                <p class="total">Total: Rp ${total.toLocaleString("id-ID")}</p>
            </div>`
            }

            // tampilkan template ke halaman
            document.getElementById("history-container").innerHTML = template
        }

        // panggil fungsi untuk nampilin history saat halaman pertama kali dibuka
        displayHistory()
    </script>
</body>
</html>
