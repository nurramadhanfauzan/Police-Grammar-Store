<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Grammar Store</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>
    <h1>POLICE GRAMMAR STORE</h1>
    <nav>
            <a href="cart.html">
                <button>Keranjang<span id="cart-count"></span></button>
            </a>
            <a href="riwayat.html" class="riwayat"><button>Riwayat</button></a>
            <label for="title">Tambah Buku</label>
            <input type="text" id="title" placeholder="Judul">
            <input type="number" id="price" placeholder="Harga">
            <button onclick="createData()">Add</button>
        
    </nav>

    <div id="container-data"></div>

    <script>
        // variabel untuk menampung id yang mau di update
        let selectedId = null

        // database buku
        let database = [
            {id: 1, title: "Grammar Patrol", price: 40000},
            {id: 2, title: "Tense Handbook", price: 60000},
            {id: 3, title: "10 Dosa Besar Soeharno", price: 1000000},
            {id: 4, title: "English Conversation Daily", price: 75000},
            {id: 5, title: "Basic Vocabulary Builder", price: 50000},
            {id: 6, title: "Advanced Grammar Mastery", price: 120000},
            {id: 7, title: "TOEFL Preparation Guide", price: 95000},
            {id: 8, title: "IELTS Speaking Secrets", price: 110000},
            {id: 9, title: "Business English 101", price: 85000},
            {id: 10, title: "English Slang & Idioms", price: 65000}
        ];

        // variabel untuk nampung data cart
        let cart = JSON.parse(localStorage.getItem("cart")) || []
        

        // untuk menyimpan data buku ke local storage
        let datalocal = localStorage.getItem("dataBuku")
        
        // kalau datanya ada di local storage, maka data yang dipake adalah data dari local storage
        if (datalocal !== null) {
            database = JSON.parse(datalocal)
        }

        // create data
        function createData() {

            // ambil value dari input
            let inputTitle = document.getElementById("title").value
            let inputPrice = document.getElementById("price").value
            
            // validasi input
            if (
                inputTitle.trim() === "" || 
                inputPrice === "" ||
                isNaN(inputPrice) ||
                Number(inputPrice) <= 0
            ) {
                alert("Judul dan harga nya diisi dulu ya manis~")
                return
            }
            
            // kalau selectedId tidak null, berarti kita sedang dalam mode update
            if (selectedId !== null) {
                for (let i = 0; i < database.length; i++) {
                    if (database[i].id === selectedId) {
                        database[i].title = inputTitle.trim()
                        database[i].price = Number(inputPrice)
                    }   
                }

                // setelah update, kita set selectedId kembali ke null supaya tidak bentrok dengan create data
                selectedId = null
            }
            else {

                // default id 1
                let id = 1

                // kalau database tidak kosong, id nya itu id terakhir + 1 supaya id unique
                if (database.length !== 0) {

                    // ambil id terakhir + 1
                    id = database[database.length - 1].id + 1
                }

                // bikin objek baru yang isinya id dan judul
                let newObj = {
                    id: id, // supaya tidak bentrok id saat delete
                    title: inputTitle.trim(), // supaya tidak diisi spasi saja
                    price: Number(inputPrice), // ubah ke number
                }
            // untuk disimpan ke database
            database.push(newObj)
        }
        // untuk menyimpan data agar tidak hilang saat web di refresh
        saveToLocalStorage()
        readData()

        // untuk mengosongkan input (biar enak UX)
        document.getElementById("title").value = ""
        document.getElementById("price").value = ""
    }

        // read data
        function readData(){
            let template = ""

            // kalau database nya kosong, tampilkan pesan "data buku masih kosong"
            if (database.length === 0) {
                document.getElementById("container-data").innerHTML = `<div class="card" style="text-align: center; padding: 20px;">
                        <p style="font-size: 30px; color: black; margin: 0; font-weight: bold;">Tidak ada buku yang tersedia.</p>
                        </div>`
                return
            }

            // looping untuk buat template card
            for (let i = 0; i < database.length; i++) {
                let perObj = database[i];
                    
                // buat template card untuk setiap data buku, tombol edit dan delete nya dikasih id supaya tau data mana yang mau di edit atau di delete
                template += `<div class="card">
                        <h3>${perObj.title}</h3>
                        <p>Rp ${perObj.price}</p>
                        <button onclick="addToCart(${perObj.id})">+Cart</button>
                        <button onclick="updateData(${perObj.id})">Edit</button>
                        <button onclick="deleteData(${perObj.id})">Hapus</button>
                        </div>`
            }

            // masukin template ke container
            let container = document.getElementById("container-data")
            container.innerHTML = template
        }

        // delete data
        function deleteData(id) {

            // konfirmasi sebelum delete
            if (!confirm("eh serius mau dihapus?")) {
                return
            }
            
            // buat array baru
            let newDatabase = []

            // looping database
            for (let i = 0; i < database.length; i++) {
                if (database[i].id !== id) {
                    newDatabase.push(database[i])
                }
            }

            // tampung array baru ke database
            database = newDatabase
            // simpan ke local storage
            saveToLocalStorage()
            // refresh table
            readData()
        }

        // update data
        function updateData(id) {
            
            // set selectedId ke id yang mau di update
            selectedId = id
            
            // cari data yang mau di update berdasarkan id
            let data = database.find(item => item.id === id)

            // masukin data yang mau di update ke input
            document.getElementById("title").value = data.title
            document.getElementById("price").value = data.price
        }

        // add to cart
        function addToCart(id) {

            // untuk cari data berdasarkan id
            let item = database.find(buku => buku.id === id)

            // dimasukin ke cart
            cart.push(item)

            // simpan ke local storage
            localStorage.setItem("cart", JSON.stringify(cart))

            // update jumlah cart di navbar
            document.getElementById("cart-count").innerText = cart.length
        }

        // untuk menyimpan data ke local storage
        function saveToLocalStorage() {
            localStorage.setItem("dataBuku", JSON.stringify(database))
        }

        // untuk nampilin jumlah cart di navbar
        document.getElementById("cart-count").innerText = cart.length
        
        // refresh table
        readData()
    </script>

</body>
</html>
