<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
</head>
<body>
    <a href="index.html">Kembali</a>

    <table id="cart-table">
        <thead>
            <tr>
                <th>No</th>
                <th>Judul</th>
                <th>Harga</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cart-container"></tbody>
    </table>

    <h3 id="total"></h3>

    <button onclick="checkout()">Checkout</button>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || []

        function readCart() {
            let template = ""

            for (let i = 0; i < cart.length; i++) {
                let item = cart[i]
                
                template += `<tr>
                            <td>${i+1}</td>
                            <td>${item.title}</td>
                            <td>${item.price}</td>
                            <td>
                                <button onclick="deleteCart(${i})">Hapus</button>
                            </td>
                            </tr>`
            }
            document.getElementById("cart-container").innerHTML = template
        }

        function totalHarga() {
            if (cart.length === 0) {
                document.getElementById("total").innerText = ""
                return
            }

            let total = 0

            for (let i = 0; i < cart.length; i++) {
                total += cart[i].price
            }
            document.getElementById("total").innerText = "Rp " + total
        }

        readCart()
        totalHarga()

        function checkout() {
            if (cart.length === 0) {
                alert("Keranjang kosong, tidak bisa checkout")
                return
            }
            let history = JSON.parse(localStorage.getItem("history")) || []
            history.push({ date: new Date().toISOString(), items: [...cart] })
            localStorage.setItem("history", JSON.stringify(history))
            cart = []
            localStorage.setItem("cart", JSON.stringify(cart))
            readCart()
            totalHarga()
            alert("Checkout berhasil! Riwayat tersimpan.")
            window.location.href = "riwayat.html"
        }

        function deleteCart(index) {
            if (!confirm("kepencet atau emang mau dihapus?")) {
                return
            }
            // untuk hapus 1 item berdasarkan cartItem
            cart.splice(index, 1)

            // update ke localStorage
            localStorage.setItem("cart", JSON.stringify(cart))

            // render ulang
            readCart()
            totalHarga()
        }
    </script>
</body>
</html>
