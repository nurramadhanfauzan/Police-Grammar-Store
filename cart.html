<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="cart.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>POLICE GRAMMAR STORE</h1>

    <nav>
        <a href="index.html">Menu</a>
        <a href="riwayat.html">Riwayat</a>
    </nav>

    <table id="cart-table">
        <thead>
            <tr>
                <th>No</th>
                <th>Judul</th>
                <th>Harga</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cart-container"></tbody>
        <tfoot>
            <tr>
                <th>Total</th>
                <th></th>
                <th></th>
                <th id="total"></th>
            </tr>
        </tfoot>
    </table>

    

    <button onclick="checkout()">Checkout</button>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || []

        function readCart() {
            let template = ""

            for (let i = 0; i < cart.length; i++) {
                let item = cart[i]
                
                template += `<tr>
                            <td>${i+1}</td>
                            <td>${item.title}</td>
                            <td>${item.price}</td>
                            <td>
                                <button onclick="deleteCart(${i})">Gak Jadi</button>
                            </td>
                            </tr>`
            }
            document.getElementById("cart-container").innerHTML = template
        }

        function totalHarga() {
            if (cart.length === 0) {
                document.getElementById("total").innerText = ""
                return
            }

            let total = 0

            for (let i = 0; i < cart.length; i++) {
                total += cart[i].price
            }
            document.getElementById("total").innerText = "Rp " + total
        }

        readCart()
        totalHarga()

        function checkout() {
            if (cart.length === 0) {
                alert("belanja dulu mas/mbak, masih kosong tuh cartnya")
                return
            }
            let history = JSON.parse(localStorage.getItem("history")) || []
            history.push({ date: new Date().toISOString(), items: [...cart] })
            localStorage.setItem("history", JSON.stringify(history))
            cart = []
            localStorage.setItem("cart", JSON.stringify(cart))
            readCart()
            totalHarga()
            alert("Checkout sukses.")
            window.location.href = "riwayat.html"
        }

        function deleteCart(index) {
            if (!confirm("beneran gak jadi beli ini?")) {
                return
            }
            // untuk hapus 1 item berdasarkan cartItem
            cart.splice(index, 1)

            // update ke localStorage
            localStorage.setItem("cart", JSON.stringify(cart))

            // render ulang
            readCart()
            totalHarga()
        }
    </script>
</body>
</html>
